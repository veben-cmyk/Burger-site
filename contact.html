<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍔BurgerHouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Poppins', sans-serif;
    }
    </style>
    </head>

    <body class="bg-[#0f172a] text-white">

</head>

<body class="class="bg-[#0f172a] text-white">

    <header class="flex items-center justify-between px-8 py-4 border-b border-gray-700">

        <div class="flex items-center gap-2 text-xl font-bold">
            🍔BurgerHouse
        </div>

            <nav class="hidden md:flex gap-8 text-gray-300">
                <a href="index.html" class="bg-[#0f172a] px-5 py-2 rounded-lg hover:bg-orange-600 transition">Accueil </a>
                <a href="menu.html" class="bg-[#0f172a] px-5 py-2 rounded-lg hover:bg-orange-600 transition">Menu</a>
                <a href="apropos.html" class="bg-[#0f172a] px-5 py-2 rounded-lg hover:bg-orange-600 transition">À propos</a>
                <a href="contact.html" class="bg-[#0f172a] px-5 py-2 rounded-lg hover:bg-orange-600 transition">Contact</a>
            </nav>

        <button class="hidden md:block bg-orange-500 px-5 py-2 rounded-lg hover:bg-orange-600 transition">
            Commander
        </button>

        <!-- 🍔 BOUTON BURGER (mobile uniquement) -->
    <!-- 👉 c'est lui qui déclenche le menu -->
        <button onclick="toggleMenu()" class="md:hidden text-3xl">
            ☰
        </button>

    </header>

    <!-- ========================= -->
    <!-- 📱 MENU MOBILE -->
    <!-- ========================= -->
    <!-- 👉 caché par défaut avec "hidden" -->
    <div id="mobileMenu" class="hidden bg-black/90 text-center py-6 space-y-4">

        <a href="index.html" class="block hover:text-orange-400">Accueil</a>
        <a href="menu.html" class="block hover:text-orange-400">Menu</a>
        <a href="about.html" class="block hover:text-orange-400">À propos</a>
        <a href="contact.html" class="block hover:text-orange-400">Contact</a>

        <button class="bg-orange-500 px-6 py-2 rounded-lg hover:bg-orange-600">
            Commander
        </button>

    </div>

    <!-- SECTION CONTACT -->

    <section class="bg-black/70 py-12 px-6 text-center">

        <h2 class="text-4xl md:text-5xl font-bold text-orange-500 mb-4">
            Contactez-nous
        </h2>

        <div class="w-32 h-1 bg-orange-500 mx-auto mb-6"></div>

        <p class="text-gray-300 mb-10 max-w-xl mx-auto">
            Une question ? Une commande spéciale ? Écrivez-nous et nous vous répondrons rapidement.
        </p>

        <div class="grid md:grid-cols-2 gap-10 max-w-5xl mx-auto text-left">
            <form class="bg-slate-800 p-6 rounded-xl shadow-lg">
                <input type="text" placeholder="Votre nom"
                    class="w-full p-2 mb-4 rounded bg-slate-700 text-white outline-none focus:ring-2 focus:ring-orange-500">

                <label class="block mb-2 text-sm">Email</label>
                <input type="email" placeholder="Votre email" class="w-full p-2 mb-4 rounded bg-slate-700 text-white outline-none focus:ring-2 focus:ring-orange-500">

                <label class="block mb-2 text-sm">Message</label>
                <textarea rows="4" placeholder="Votre message" class="w-full p-2 mb-4 rounded bg-slate-700 text-white outline-none focus:ring-2 focus:ring-orange-500"></textarea>

                <button class="bg-orange-500 w-full py-2 rounded-lg hover:bg-orange-600">
                    Envoyer
                </button>
            </form>

        <!-- INFOS -->
            <div class="flex flex-col justify-center">
                <h3 class="text-2xl font-semibold mb-4 text-white">
                    Nos coordonnées
                </h3>

                <p class="text-gray-300 mb-3">
                    📍 Kinshasa, RDC
                </p>

                <p class="text-gray-300 mb-3">
                    📞 +243 000 000 000
                </p>

                <p class="text-gray-300 mb-6">
                    📧 contact@burgerhouse.com
                </p>

                <div class="bg-slate-800 p-4 rounded-lg">
                    <p class="text-gray-400 text-sm">
                        Ouvert tous les jours :
                    </p>
                    <p class="text-white font-semibold">
                        10h - 23h
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- ========================= -->
    <!-- ⚙️ SCRIPT (OBLIGATOIRE) -->
    <!-- ========================= -->
    <!-- 👉 toujours juste avant </body> -->
    <script>
        function toggleMenu() {
        const menu = document.getElementById("mobileMenu");

      // 👉 ajoute ou enlève "hidden"
        menu.classList.toggle("hidden");
    }
    </script>

</body>
</html>
